<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Campeones! Spain — FIFA World Cup 2026</title>
<style>
  :root{
    --rojo: #AA151B;
    --rojo-deep: #6B0F14;
    --oro: #F1BF00;
    --oro-soft: #FFE27A;
    --noche: #1A0505;
    --crema: #FFF7E8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background: radial-gradient(ellipse at 50% 20%, var(--rojo-deep) 0%, var(--noche) 70%);
    overflow-x:hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    color: var(--crema);
  }
  @font-face{
    font-family: 'PoscopeCondensed';
    src: local('Arial Narrow Bold'), local('Helvetica Neue Condensed Bold');
  }

  .stage{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 6vh 5vw;
    text-align:center;
    overflow:hidden;
  }

  /* Sunburst rays behind everything - "Sol de España" */
  .sunburst{
    position:absolute;
    top:50%; left:50%;
    width:220vmax; height:220vmax;
    transform: translate(-50%,-50%);
    background: repeating-conic-gradient(
      var(--oro) 0deg 4deg,
      transparent 4deg 16deg
    );
    opacity:0.07;
    animation: spin 90s linear infinite;
    pointer-events:none;
  }
  @keyframes spin{ to{ transform: translate(-50%,-50%) rotate(360deg); } }

  .eyebrow{
    letter-spacing: 0.5em;
    font-size: clamp(0.7rem, 1.4vw, 0.95rem);
    text-transform: uppercase;
    color: var(--oro);
    font-family: Georgia, serif;
    font-style: italic;
    z-index:2;
    opacity:0;
    animation: fadeUp 0.8s 0.2s forwards ease-out;
  }

  .wordmark{
    z-index:2;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 900;
    font-style: italic;
    font-size: clamp(3.2rem, 13vw, 9rem);
    line-height: 0.92;
    letter-spacing: -0.01em;
    background: linear-gradient(180deg, var(--oro-soft) 0%, var(--oro) 45%, #A5780A 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 60px rgba(241,191,0,0.35);
    margin: 0.2em 0 0.05em;
    opacity:0;
    animation: fadeUp 0.9s 0.45s forwards ease-out;
  }

  .subline{
    z-index:2;
    font-size: clamp(1rem, 2.4vw, 1.5rem);
    color: var(--crema);
    font-style: italic;
    opacity: 0.9;
    margin-bottom: 0.3em;
    opacity:0;
    animation: fadeUp 0.9s 0.7s forwards ease-out;
  }

  .scoreline{
    z-index:2;
    display:flex;
    align-items:center;
    gap: 1.4em;
    margin: 1.6em 0 0.6em;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
    opacity:0;
    animation: fadeUp 0.9s 0.95s forwards ease-out;
  }
  .scoreline .team{
    font-size: clamp(1.1rem, 2.6vw, 1.7rem);
    font-weight:700;
    color: var(--crema);
  }
  .scoreline .vs{
    font-size: 0.9rem;
    color: var(--oro);
    opacity:0.7;
  }

  .trophy-wrap{
    z-index:2;
    margin: 1.4em 0;
    opacity:0;
    animation: trophyIn 1.1s 1.15s forwards cubic-bezier(.2,1.4,.4,1);
  }
  .trophy{
    width: clamp(90px, 14vw, 160px);
    height: auto;
    filter: drop-shadow(0 0 40px rgba(241,191,0,0.55));
    animation: lift 3.4s 2.3s ease-in-out infinite;
  }

  .tagline{
    z-index:2;
    font-family: Georgia, serif;
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    max-width: 34ch;
    line-height:1.5;
    color: var(--crema);
    opacity:0;
    animation: fadeUp 0.9s 1.4s forwards ease-out;
  }
  .tagline strong{ color: var(--oro); }

  .divider{
    width: 64px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--oro), transparent);
    margin: 1.6em 0;
    z-index:2;
    opacity:0;
    animation: fadeUp 0.9s 1.3s forwards ease-out;
  }

  .credit{
    position:absolute;
    bottom: 2.4vh;
    font-size: 0.7rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color: rgba(255,247,232,0.35);
    z-index:2;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes trophyIn{
    0%{ opacity:0; transform: scale(0.4) translateY(40px); }
    60%{ opacity:1; transform: scale(1.08) translateY(-6px); }
    100%{ opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes lift{
    0%,100%{ transform: translateY(0) rotate(-1.5deg); }
    50%{ transform: translateY(-10px) rotate(1.5deg); }
  }

  /* Confetti */
  .confetti{
    position:fixed;
    top:-10px;
    width:10px; height:16px;
    opacity:0.9;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    z-index:1;
  }
  @keyframes fall{
    0%{ transform: translateY(-10vh) rotate(0deg); }
    100%{ transform: translateY(110vh) rotate(600deg); }
  }

  @media (prefers-reduced-motion: reduce){
    .sunburst, .trophy, .confetti{ animation: none !important; }
    .wordmark, .subline, .scoreline, .trophy-wrap, .tagline, .divider, .eyebrow{
      opacity:1 !important; animation:none !important; transform:none !important;
    }
  }

  @media (max-width:480px){
    .scoreline{ flex-direction:row; gap:0.8em; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="sunburst"></div>

  <div class="eyebrow">FIFA World Cup · 2026</div>
  <h1 class="wordmark">¡CAMPEONES!</h1>
  <div class="subline">La Roja lifts the trophy once more</div>

  <div class="scoreline">
    <span class="team">🇪🇸 ESPAÑA</span>
    <span class="vs">CHAMPIONS</span>
  </div>

  <div class="trophy-wrap">
    <svg class="trophy" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFE27A"/>
          <stop offset="50%" stop-color="#F1BF00"/>
          <stop offset="100%" stop-color="#A5780A"/>
        </linearGradient>
      </defs>
      <path d="M35 10 L65 10 L65 30 Q65 55 50 60 Q35 55 35 30 Z" fill="url(#goldGrad)"/>
      <path d="M35 15 Q15 15 15 32 Q15 46 32 48" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
      <path d="M65 15 Q85 15 85 32 Q85 46 68 48" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
      <rect x="46" y="58" width="8" height="24" fill="url(#goldGrad)"/>
      <path d="M30 82 L70 82 L76 96 L24 96 Z" fill="url(#goldGrad)"/>
      <rect x="20" y="96" width="60" height="10" rx="2" fill="url(#goldGrad)"/>
      <circle cx="50" cy="30" r="6" fill="#6B0F14" opacity="0.5"/>
    </svg>
  </div>

  <div class="divider"></div>

  <p class="tagline">Thirty-one days, one relentless run — and <strong>Spain</strong> stands alone at the top of the world once again. Enhorabuena, campeones.</p>

  <div class="credit">WCPrediction2026</div>
</div>

<script>
  // Confetti in Spain's colors
  const colors = ['#AA151B', '#F1BF00', '#FFE27A', '#6B0F14', '#FFF7E8'];
  const shapes = ['rect']; // simple rectangles read as ribbon confetti
  const container = document.body;
  const CONFETTI_COUNT = 90;

  for (let i = 0; i < CONFETTI_COUNT; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const size = 6 + Math.random() * 8;
    const duration = 5 + Math.random() * 6;
    const delay = Math.random() * 8;
    const drift = (Math.random() - 0.5) * 40;

    piece.style.background = color;
    piece.style.left = left + 'vw';
    piece.style.width = size + 'px';
    piece.style.height = (size * 1.6) + 'px';
    piece.style.animationDuration = duration + 's';
    piece.style.animationDelay = delay + 's';
    piece.style.setProperty('--drift', drift + 'px');
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';

    container.appendChild(piece);
  }
</script>
</body>
</html>
